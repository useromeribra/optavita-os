<!-- register.html (واجهة التسجيل الفاخرة) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | OptaVita OS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <h1>Create Account</h1>
    <p class="subtitle">Join the future of intelligence</p>

    <div class="form-group">
      <input type="email" placeholder="Email">
    </div>
    <div class="form-group">
      <input type="password" placeholder="Password">
    </div>
    <div class="form-buttons">
      <button class="btn login-btn" onclick="fakeLogin()">Log In</button>
      <button class="btn create-btn" onclick="fakeRegister()">Create Account</button>
    </div>
    <p id="response" class="subtitle"></p>
  </div>

  <script>
    function fakeLogin() {
      document.getElementById("response").textContent = "✅ Logged in successfully.";
      setTimeout(() => window.location.href = 'user-type.html', 1500);
    }
    function fakeRegister() {
      document.getElementById("response").textContent = "✅ Account created successfully.";
      setTimeout(() => window.location.href = 'user-type.html', 1500);
    }
  </script>
</body>
</html>
