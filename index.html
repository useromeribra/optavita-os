<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OptaVita OS - Start Your Journey</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1 class="headline">🌍 Welcome to OptaVita OS</h1>
    <p class="subtitle">Experience the future of intelligence — start your journey now.</p>

    <div class="language-section">
      <label for="language-search">Choose your language:</label>
      <input type="text" id="language-search" placeholder="Search language..."/>
      <div id="language-buttons">
        <!-- Language buttons will be generated here -->
      </div>
    </div>

    <button id="start-btn" disabled>Start your journey</button>
  </div>

  <script>
    const languages = [
      "English", "Arabic", "Spanish", "French", "German", "Chinese", "Japanese", "Korean", "Hindi",
      "Portuguese", "Russian", "Turkish", "Italian", "Dutch", "Swedish", "Norwegian", "Thai",
      "Indonesian", "Vietnamese", "Hebrew"
    ];

    const languageButtonsContainer = document.getElementById("language-buttons");
    const searchInput = document.getElementById("language-search");
    const startBtn = document.getElementById("start-btn");

    let selectedLanguage = "";

    function renderLanguages(filter = "") {
      languageButtonsContainer.innerHTML = "";
      const filtered = languages.filter(lang =>
        lang.toLowerCase().includes(filter.toLowerCase())
      );
      filtered.forEach(lang => {
        const btn = document.createElement("button");
        btn.textContent = lang;
        btn.classList.add("lang-btn");
        btn.onclick = () => {
          selectedLanguage = lang;
          startBtn.disabled = false;
          startBtn.textContent = lang === "Arabic" ? "ابدأ رحلتك" : "Start your journey";
        };
        languageButtonsContainer.appendChild(btn);
      });
    }

    searchInput.addEventListener("input", (e) => {
      renderLanguages(e.target.value);
    });

    startBtn.addEventListener("click", () => {
      if (selectedLanguage) {
        localStorage.setItem("userLanguage", selectedLanguage);
        window.location.href = "auth.html";
      }
    });

    renderLanguages();
  </script>
</body>
</html>
