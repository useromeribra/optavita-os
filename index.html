<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OptaVita OS - Start Your Journey</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- المرحلة 1: اختيار اللغة -->
  <div id="language-section">
    <h1>🌍 Welcome to OptaVita OS</h1>
    <p>Please choose your language to begin your journey.</p>
    <select id="language-select">
      <option value="en">English</option>
      <option value="ar">العربية</option>
      <option value="zh">中文</option>
      <option value="ja">日本語</option>
      <option value="tr">Türkçe</option>
      <!-- زود لغات كمان هنا -->
    </select>
    <button onclick="goToLogin()">Start Your Journey</button>
  </div>

  <!-- المرحلة 2: تسجيل الدخول -->
  <div id="login-section" style="display: none;">
    <h2>🔐 Login to Your Account</h2>
    <input type="email" placeholder="Email" />
    <input type="password" placeholder="Password" />
    <button onclick="goToUserType()">Login</button>
  </div>

  <!-- المرحلة 3: اختيار نوع المستخدم -->
  <div id="user-type-section" style="display: none;">
    <h2>👤 Select User Type</h2>
    <button>Individual</button>
    <button>Company</button>
    <button>VIP</button>
    <button>Developer</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
