<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Select User Type | OptaVita OS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1 id="title">Choose your user type</h1>
    <p id="subtitle">Customize your OptaVita experience</p>

    <div id="user-types">
      <button class="user-btn" data-type="basic">🣍 Basic</button>
      <button class="user-btn" data-type="business">🏢 Business</button>
      <button class="user-btn" data-type="vip">💎 VIP</button>
      <button class="user-btn" data-type="developer">👨‍💻 Developer</button>
    </div>
  </div>

  <script>
    const lang = localStorage.getItem("optavita_lang") || "en";

    const translations = {
      en: {
        title: "Choose your user type",
        subtitle: "Customize your OptaVita experience",
        basic: "🣝 Basic",
        business: "🏢 Business",
        vip: "💎 VIP",
        developer: "👨‍💻 Developer",
      },
      ar: {
        title: "\u0627\u062e\u062a\u0631 \u0646\u0648\u0639 \u0627\u0644\u0645\u0633\u062a\u062e\u062f\u0645",
        subtitle: "\u062e\u0635\u0635 \u062a\u062c\u0631\u0628\u062a\u0643 \u0641\u064a OptaVita",
        basic: "🣝 \u0639\u0627\u062f\u064a",
        business: "🏢 \u0634\u0631\u0643\u0629",
        vip: "💎 VIP",
        developer: "👨‍💻 \u0645\u0637\u0648\u0631",
      },
      fr: {
        title: "Choisissez votre type d'utilisateur",
        subtitle: "Personnalisez votre expérience OptaVita",
        basic: "🣝 Basique",
        business: "🏢 Entreprise",
        vip: "💎 VIP",
        developer: "👨‍💻 Développeur",
      }
    };

    const t = translations[lang] || translations["en"];
    document.getElementById("title").textContent = t.title;
    document.getElementById("subtitle").textContent = t.subtitle;

    const buttons = document.querySelectorAll(".user-btn");
    buttons[0].textContent = t.basic;
    buttons[1].textContent = t.business;
    buttons[2].textContent = t.vip;
    buttons[3].textContent = t.developer;

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        const type = btn.getAttribute("data-type");
        localStorage.setItem("optavita_user_type", type);
        alert(`${type} selected!`);
        window.location.href = "dashboard.html";
      });
    });
  </script>
</body>
</html>
